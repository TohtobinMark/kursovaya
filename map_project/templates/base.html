<!-- templates/base.html -->
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Карта с маркерами{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
        <!-- ПОДКЛЮЧАЕМ НАШИ СТИЛИ -->
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        /* inline стили можно оставить здесь */
        body { padding-bottom: 50px; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="{% url 'home' %}">
            <i class="bi bi-geo-alt"></i> Карта маркеров
        </a>

        <div class="navbar-nav ms-auto">
            {% if user.is_authenticated %}
                <div class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle text-light" href="#" role="button"
                       data-bs-toggle="dropdown">
                        <i class="bi bi-person-circle"></i> {{ user.username }}
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li>
                            <a class="dropdown-item" href="{% url 'home' %}">
                                <i class="bi bi-map"></i> Моя карта
                            </a>
                        </li>
                        <li>
                            <a class="dropdown-item" href="{% url 'add_location' %}">
                                <i class="bi bi-plus-circle"></i> Добавить маркер
                            </a>
                        </li>
                        <li><hr class="dropdown-divider"></li>
                        <li>
                            <a class="dropdown-item" href="{% url 'logout' %}">
                                <i class="bi bi-box-arrow-right"></i> Выйти
                            </a>
                        </li>
                    </ul>
                </div>
            {% else %}
                <a class="nav-link" href="{% url 'login' %}">
                    <i class="bi bi-box-arrow-in-right"></i> Войти
                </a>
                <a class="nav-link" href="{% url 'register' %}">
                    <i class="bi bi-person-plus"></i> Регистрация
                </a>
            {% endif %}
        </div>
    </div>
</nav>

    <div class="container mt-4">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}

        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
